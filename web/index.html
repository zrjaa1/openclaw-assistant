<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Assistant</title>
<script src="config.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        surface: { 0: '#0a0a0a', 1: '#111111', 2: '#1a1a1a', 3: '#222222', 4: '#2a2a2a' },
        border: { subtle: '#1e1e1e', default: '#2a2a2a', hover: '#333333' },
        text: { primary: '#f0f0f0', secondary: '#999999', tertiary: '#666666' },
        accent: { 500: '#6366f1', 600: '#5558e6', 700: '#4447d0' },
      }
    }
  }
}
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

  /* Scrollbar */
  .chat-scroll::-webkit-scrollbar { width: 5px; }
  .chat-scroll::-webkit-scrollbar-track { background: transparent; }
  .chat-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 999px; }

  /* Code blocks */
  pre code {
    display: block; overflow-x: auto; padding: 1rem;
    background: #0d0d0d; color: #cdd6f4; border-radius: 0.75rem;
    border: 1px solid #1e1e1e;
    font-size: 0.8rem; line-height: 1.6;
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", Consolas, monospace;
  }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-enter { animation: fadeIn 0.3s ease-out; }

  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .typing-pulse { animation: pulse 1.5s ease-in-out infinite; }
  .typing-pulse:nth-child(2) { animation-delay: 0.15s; }
  .typing-pulse:nth-child(3) { animation-delay: 0.3s; }

  /* Textarea */
  #chat-input { max-height: 120px; }

  /* Smooth transitions */
  .screen-transition { transition: opacity 0.2s ease; }

  /* Selection */
  ::selection { background: rgba(99, 102, 241, 0.3); }
</style>
</head>
<body class="bg-surface-0 flex flex-col overflow-hidden text-text-primary" style="height: 100vh; height: 100dvh;">

<!-- ==================== AUTH SCREEN ==================== -->
<div id="auth-screen" class="flex-1 flex flex-col screen-transition">
  <div class="flex justify-end p-4 shrink-0 relative z-10">
    <button id="auth-lang-toggle" class="text-sm text-text-secondary hover:text-text-primary transition px-3 py-1.5 rounded-lg hover:bg-surface-2"></button>
  </div>
  <div class="flex-1 flex items-center justify-center p-4 -mt-12 relative z-0">
  <div class="bg-surface-1 rounded-2xl border border-border-default p-8 w-full max-w-sm">
    <!-- Logo / Brand -->
    <div class="text-center mb-6">
      <div class="w-14 h-14 bg-accent-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-text-primary">OpenClaw Assistant</h1>
      <p id="auth-tagline" class="text-sm text-text-tertiary mt-1"></p>
    </div>

      <!-- Tab Toggle -->
      <div class="flex mb-5 bg-surface-0 rounded-xl p-1">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 bg-surface-3 text-text-primary"></button>
        <button id="tab-register" onclick="switchTab('register')"
          class="flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 text-text-tertiary"></button>
      </div>

      <form id="auth-form" onsubmit="handleAuth(event)">
        <input id="input-username" type="text" autocomplete="username"
          class="w-full mb-3 px-4 py-3 bg-surface-2 border border-border-default rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500/30 focus:border-accent-500 text-sm text-text-primary placeholder-text-tertiary transition-all duration-200" />
        <input id="input-password" type="password" autocomplete="current-password"
          class="w-full mb-4 px-4 py-3 bg-surface-2 border border-border-default rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500/30 focus:border-accent-500 text-sm text-text-primary placeholder-text-tertiary transition-all duration-200" />
        <div id="auth-error" class="text-red-400 text-sm mb-3 hidden"></div>
        <button type="submit" id="auth-btn"
          class="w-full py-3 bg-accent-500 text-white font-medium rounded-xl hover:bg-accent-600 active:bg-accent-700 transition-all duration-200 text-sm"></button>
      </form>

  </div>
  </div>
</div>

<!-- ==================== CHAT SCREEN ==================== -->
<div id="chat-screen" class="flex-1 flex flex-col hidden screen-transition min-h-0 overflow-hidden">
  <!-- Header -->
  <div class="bg-surface-1/80 backdrop-blur-sm border-b border-border-subtle px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-accent-500 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
        </svg>
      </div>
      <span class="font-semibold text-text-primary text-sm">OpenClaw Assistant</span>
    </div>
    <div class="flex items-center gap-3">
      <button id="new-chat-btn" onclick="startNewChat()"
        class="text-xs text-text-secondary hover:text-text-primary transition px-2 py-1.5 rounded-lg hover:bg-surface-2 flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        <span id="new-chat-label"></span>
      </button>
      <button id="lang-toggle"
        class="text-xs text-text-secondary hover:text-text-primary transition px-2 py-1.5 rounded-lg hover:bg-surface-2"></button>
      <span id="quota-display" class="hidden"></span>
      <button onclick="logout()" id="logout-btn"
        class="text-xs text-text-tertiary hover:text-red-400 transition px-2 py-1 rounded-lg hover:bg-surface-2"></button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto chat-scroll">
    <div class="max-w-3xl mx-auto px-4 py-6 space-y-4">
      <!-- Welcome message -->
      <div id="welcome-msg" class="msg-enter">
        <div class="flex justify-start">
          <div class="max-w-[85%] sm:max-w-[75%] bg-surface-2 rounded-2xl rounded-tl-md px-5 py-4 text-sm leading-relaxed text-text-primary border border-border-subtle">
            <div id="welcome-text"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Typing indicator -->
  <div id="typing" class="hidden">
    <div class="max-w-3xl mx-auto px-4 pb-2">
      <div class="flex justify-start">
        <div class="bg-surface-2 rounded-2xl rounded-tl-md px-5 py-3 border border-border-subtle">
          <div class="flex items-center gap-1.5">
            <span class="typing-pulse w-1.5 h-1.5 bg-text-tertiary rounded-full inline-block"></span>
            <span class="typing-pulse w-1.5 h-1.5 bg-text-tertiary rounded-full inline-block"></span>
            <span class="typing-pulse w-1.5 h-1.5 bg-text-tertiary rounded-full inline-block"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="shrink-0 border-t border-border-subtle bg-surface-1/80 backdrop-blur-sm">
    <div class="max-w-3xl mx-auto p-4">
      <form onsubmit="sendMessage(event)" class="flex items-end gap-3">
        <div class="flex-1 relative">
          <textarea id="chat-input" rows="1"
            class="w-full resize-none px-4 py-3 bg-surface-2 border border-border-default rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500/30 focus:border-accent-500 text-sm text-text-primary placeholder-text-tertiary leading-relaxed transition-all duration-200"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage(event)}"
            oninput="autoResize(this)"></textarea>
        </div>
        <button type="submit" id="send-btn"
          class="p-3 bg-accent-500 text-white rounded-xl hover:bg-accent-600 active:bg-accent-700 transition-all duration-200 shrink-0 disabled:opacity-30 disabled:cursor-not-allowed">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
          </svg>
        </button>
      </form>
    </div>
  </div>
</div>

<script>
// ==================== i18n ====================

const STRINGS = {
  en: {
    tagline: 'Your AI assistant for OpenClaw',
    login: 'Log in',
    register: 'Sign up',
    username: 'Username',
    password: 'Password',
    usernameTooShort: 'Username must be 3–32 characters',
    passwordTooShort: 'Password must be at least 6 characters',
    networkError: 'Network error, please try again',
    actionFailed: 'Action failed',
    logout: 'Log out',
    inputPlaceholder: 'Ask a question...',
    quotaLabel: (n) => `${n} left`,
    quotaExhausted: 'No messages remaining. Please top up to continue.',
    requestFailed: 'Request failed, please try again',
    copied: 'Copied',
    copy: 'Copy',
    newChat: 'New chat',
    welcome: `
      <p class="font-medium mb-2">Hi! I'm the OpenClaw assistant.</p>
      <p class="mb-2">OpenClaw is an open-source tool that brings AI into your everyday chat apps — Telegram, Discord, WhatsApp, Slack, and more. No new apps to learn, just chat.</p>
      <p class="mb-2">It can help you:</p>
      <ul class="list-disc list-inside mb-2 space-y-0.5 text-text-secondary">
        <li>Chat with AI right inside your favorite messaging app</li>
        <li>Get daily weather, news, and reminders automatically</li>
        <li>Send images for translation, analysis, or summaries</li>
        <li>Keep your data on your own machine</li>
      </ul>
      <p>Tell me your operating system (Windows, Mac, or Linux) and let's get started!</p>
    `,
  },
  zh: {
    tagline: '小龙虾助手',
    login: '登录',
    register: '注册',
    username: '用户名',
    password: '密码',
    usernameTooShort: '用户名需要 3–32 个字符',
    passwordTooShort: '密码至少 6 个字符',
    networkError: '网络错误，请重试',
    actionFailed: '操作失败',
    logout: '退出',
    inputPlaceholder: '输入问题...',
    quotaLabel: (n) => `剩余 ${n} 次`,
    quotaExhausted: '对话次数已用完，请充值后继续使用。',
    requestFailed: '请求失败，请重试',
    copied: '已复制',
    copy: '复制',
    newChat: '新对话',
    welcome: `
      <p class="font-medium mb-2">你好！我是小龙虾（OpenClaw）的助手。</p>
      <p class="mb-2">小龙虾是一个让 AI 住进你微信、飞书、钉钉的开源工具——不用打开新网页，直接在聊天里用 AI。</p>
      <p class="mb-2">它能帮你：</p>
      <ul class="list-disc list-inside mb-2 space-y-0.5 text-text-secondary">
        <li>在微信里随时问问题，就像跟朋友聊天</li>
        <li>每天自动发天气、新闻摘要、工作提醒</li>
        <li>发图片让 AI 帮你翻译、分析、总结</li>
        <li>你的数据在自己电脑上，不经过第三方</li>
      </ul>
      <p>告诉我你的操作系统（Windows、Mac 还是 Linux），我们开始安装吧！</p>
    `,
  },
};

// Detect language: respect explicit user choice, otherwise auto-detect from browser
function detectLang() {
  const saved = localStorage.getItem('lang');
  // Only trust localStorage if user explicitly toggled (marked by 'lang-explicit')
  if (saved && localStorage.getItem('lang-explicit') === '1') return saved;
  // Auto-detect from browser
  return navigator.language.startsWith('zh') ? 'zh' : 'en';
}
let currentLang = detectLang();

function t(key) {
  return STRINGS[currentLang][key] || STRINGS.en[key] || key;
}

function applyLang() {
  // Auth screen
  document.getElementById('auth-tagline').textContent = t('tagline');
  document.getElementById('tab-login').textContent = t('login');
  document.getElementById('tab-register').textContent = t('register');
  document.getElementById('input-username').placeholder = t('username');
  document.getElementById('input-password').placeholder = t('password');
  document.getElementById('auth-btn').textContent = authMode === 'login' ? t('login') : t('register');
  document.getElementById('auth-lang-toggle').textContent = currentLang === 'zh' ? 'EN' : '中文';
  // Chat screen
  document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'EN' : '中文';
  document.getElementById('new-chat-label').textContent = t('newChat');
  document.getElementById('logout-btn').textContent = t('logout');
  document.getElementById('chat-input').placeholder = t('inputPlaceholder');
  const welcomeText = document.getElementById('welcome-text');
  if (welcomeText) welcomeText.innerHTML = t('welcome');
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', currentLang);
  localStorage.setItem('lang-explicit', '1');  // mark as user's explicit choice
  applyLang();
}

// ==================== CONFIG ====================

const API = window.BACKEND_API_URL || window.location.origin;
let token = localStorage.getItem('token');
let conversationId = null;
let isStreaming = false;
let authMode = 'login';

// ==================== AUTH ====================

function switchTab(mode) {
  authMode = mode;
  const loginTab = document.getElementById('tab-login');
  const regTab = document.getElementById('tab-register');
  if (mode === 'login') {
    loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 bg-surface-3 text-text-primary';
    regTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 text-text-tertiary';
  } else {
    regTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 bg-surface-3 text-text-primary';
    loginTab.className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-200 text-text-tertiary';
  }
  document.getElementById('auth-btn').textContent = mode === 'login' ? t('login') : t('register');
  document.getElementById('input-password').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideError() {
  document.getElementById('auth-error').classList.add('hidden');
}

async function handleAuth(e) {
  e.preventDefault();
  hideError();
  const username = document.getElementById('input-username').value.trim();
  const password = document.getElementById('input-password').value;

  if (authMode === 'register') {
    if (username.length < 3 || username.length > 32) { showError(t('usernameTooShort')); return; }
    if (password.length < 6) { showError(t('passwordTooShort')); return; }
  }

  const endpoint = authMode === 'login' ? '/api/web/login' : '/api/web/register';
  try {
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept-Language': currentLang },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      showError(data.detail || t('actionFailed'));
      return;
    }
    token = data.token;
    localStorage.setItem('token', token);
    showChat(data.remaining_quota);
  } catch (err) {
    showError(t('networkError'));
  }
}

function logout() {
  token = null;
  conversationId = null;
  localStorage.removeItem('token');
  document.getElementById('chat-screen').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  resetChatUI();
}

function startNewChat() {
  conversationId = null;
  resetChatUI();
}

function resetChatUI() {
  const container = document.getElementById('messages').querySelector('.max-w-3xl');
  container.innerHTML = `
    <div id="welcome-msg" class="msg-enter">
      <div class="flex justify-start">
        <div class="max-w-[85%] sm:max-w-[75%] bg-surface-2 rounded-2xl rounded-tl-md px-5 py-4 text-sm leading-relaxed text-text-primary border border-border-subtle">
          <div id="welcome-text">${t('welcome')}</div>
        </div>
      </div>
    </div>`;
  document.getElementById('input-username').value = '';
  document.getElementById('input-password').value = '';
}

// ==================== CHAT ====================

function showChat(quota) {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('chat-screen').classList.remove('hidden');
  if (quota !== undefined) updateQuota(quota);
  loadConversation();
}

function updateQuota(n) {
  const fn = t('quotaLabel');
  document.getElementById('quota-display').textContent = typeof fn === 'function' ? fn(n) : `${n}`;
}

async function apiFetch(path, opts = {}) {
  opts.headers = { ...opts.headers, Authorization: `Bearer ${token}` };
  const res = await fetch(API + path, opts);
  if (res.status === 401) { logout(); throw new Error('unauthorized'); }
  return res;
}

async function loadConversation() {
  try {
    const res = await apiFetch('/api/conversation/latest');
    const data = await res.json();
    if (data.conversation_id) {
      conversationId = data.conversation_id;
      const container = document.getElementById('messages').querySelector('.max-w-3xl');
      container.innerHTML = '';
      data.messages.forEach(m => appendMessage(m.role, m.content));
    }
    const qres = await apiFetch('/api/quota');
    const qdata = await qres.json();
    updateQuota(qdata.remaining);
  } catch (e) {
    if (e.message !== 'unauthorized') console.error(e);
  }
}

function appendMessage(role, content) {
  const welcome = document.getElementById('welcome-msg');
  if (welcome) welcome.remove();

  const container = document.getElementById('messages').querySelector('.max-w-3xl');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-enter';

  const align = document.createElement('div');
  align.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';

  const bubble = document.createElement('div');
  if (role === 'user') {
    bubble.className = 'max-w-[85%] sm:max-w-[75%] bg-accent-500 text-white rounded-2xl rounded-tr-md px-5 py-3 text-sm leading-relaxed';
    bubble.innerHTML = escapeHtml(content).replace(/\n/g, '<br>');
  } else {
    bubble.className = 'max-w-[85%] sm:max-w-[75%] bg-surface-2 rounded-2xl rounded-tl-md px-5 py-4 text-sm leading-relaxed text-text-primary border border-border-subtle';
    bubble.innerHTML = renderMarkdown(content);
  }

  align.appendChild(bubble);
  wrapper.appendChild(align);
  container.appendChild(wrapper);
  scrollToBottom();
  return bubble;
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function renderMarkdown(text) {
  // Code blocks with language label
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = escapeHtml(code.trim());
    const langLabel = lang ? `<span class="absolute top-2.5 left-3 text-xs text-text-tertiary font-mono">${lang}</span>` : '';
    return `<div class="relative my-3">${langLabel}<pre class="mt-0"><code>${escaped}</code></pre><button onclick="copyCode(this)" class="absolute top-2 right-2 text-xs text-text-tertiary px-2 py-1 rounded-md hover:bg-surface-3 hover:text-text-secondary transition">${t('copy')}</button></div>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code class="bg-surface-3 text-text-primary px-1.5 py-0.5 rounded text-xs font-mono border border-border-subtle">$1</code>');
  // Headings (## and ###)
  text = text.replace(/^###\s+(.+)$/gm, '<p class="font-semibold text-text-primary mt-3 mb-1">$1</p>');
  text = text.replace(/^##\s+(.+)$/gm, '<p class="font-semibold text-text-primary text-base mt-3 mb-1">$1</p>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="font-semibold text-text-primary">$1</strong>');
  // Numbered lists
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li class="ml-4 list-decimal" value="$1">$2</li>');
  // Bullet lists
  text = text.replace(/^[•\-]\s+(.+)$/gm, '<li class="ml-4 list-disc">$1</li>');
  // Wrap consecutive <li> in <ul>/<ol>
  text = text.replace(/((?:<li class="ml-4 list-decimal"[^>]*>.*?<\/li>\n?)+)/g, '<ol class="my-1 space-y-0.5">$1</ol>');
  text = text.replace(/((?:<li class="ml-4 list-disc">.*?<\/li>\n?)+)/g, '<ul class="my-1 space-y-0.5">$1</ul>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function copyCode(btn) {
  const code = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code);
  btn.textContent = t('copied');
  setTimeout(() => btn.textContent = t('copy'), 1500);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage(e) {
  e.preventDefault();
  if (isStreaming) return;

  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;

  input.value = '';
  input.style.height = 'auto';
  appendMessage('user', message);

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('typing').classList.remove('hidden');
  scrollToBottom();

  const assistantBubble = appendMessage('assistant', '');

  try {
    const res = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({ message, conversation_id: conversationId, client_type: 'web' }),
    });

    if (res.status === 401) { logout(); return; }
    if (res.status === 403) {
      const data = await res.json();
      assistantBubble.innerHTML = renderMarkdown(data.detail || t('quotaExhausted'));
      return;
    }
    if (!res.ok) {
      assistantBubble.innerHTML = renderMarkdown(t('requestFailed'));
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullContent = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          if (event.type === 'message') {
            fullContent += event.content;
            assistantBubble.innerHTML = renderMarkdown(fullContent);
            scrollToBottom();
          } else if (event.type === 'done') {
            conversationId = event.conversation_id;
          } else if (event.type === 'error') {
            fullContent += '\n\n[Error: ' + event.content + ']';
            assistantBubble.innerHTML = renderMarkdown(fullContent);
          }
        } catch (e) { /* ignore parse errors */ }
      }
    }

    // Refresh quota
    try {
      const qres = await apiFetch('/api/quota');
      const qdata = await qres.json();
      updateQuota(qdata.remaining);
    } catch (e) { /* ignore */ }

  } catch (err) {
    if (err.message !== 'unauthorized') {
      assistantBubble.innerHTML = renderMarkdown(t('requestFailed'));
    }
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('typing').classList.add('hidden');
  }
}

  toggleLang();

document.getElementById('lang-toggle').addEventListener('click', function(e) {

applyLang();
if (token) {
  showChat();
}
